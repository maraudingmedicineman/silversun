type: script
snippets:
  - echo -e "\033[1;33mDisabling local layering...\033[0m"
  - sed -i '/^#*LockLayering=.*/s/.*/LockLayering=true/' /etc/rpm-ostreed.conf
  - echo -e "\033[1;33mDisabling package managers...\033[0m"
  - ln -sf /usr/bin/true /usr/bin/dnf
  - ln -sf /usr/bin/true /usr/bin/dnf5
  - ln -sf /usr/bin/true /usr/bin/yum
  - echo -e "\033[Populating system service defaults...\033[0m"
  - echo "disable flatpak-add-fedora-repos.service" >> /usr/lib/systemd/system-preset/00-silversun-system.preset
  - echo "enable bootc-fetch-updates.timer" >> /usr/lib/systemd/system-preset/00-silversun-system.preset
  - echo -e "\033[Populating user service defaults...\033[0m"
  - echo "enable flatpak-install.service" >> /usr/lib/systemd/user-preset/00-silversun-user.preset
  - echo "enable flatpak-user-update.timer" >> /usr/lib/systemd/user-preset/00-silversun-user.preset
  - echo "enable podman.service" >> /usr/lib/systemd/user-preset/00-silversun-user.preset
  - echo "enable podman.socket" >> /usr/lib/systemd/user-preset/00-silversun-user.preset
